<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>後台登入</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:Arial;
  color:white;
}

.box{
  background:#1c1c1c;
  padding:40px;
  border-radius:12px;
  text-align:center;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#00c300;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}

.msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>車商後台登入</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="密碼">

  <button onclick="login()">登入</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("msg");

// 🔥 已登入直接進後台
onAuthStateChanged(auth, (user) => {
  if (user) {
    msg.innerText = "已登入，自動進入後台...";
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 500);
  }
});

// 🔐 登入
window.login = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  msg.innerText = "登入中...";

  try {
    await signInWithEmailAndPassword(auth, email, password);

    msg.innerText = "✅ 登入成功，正在進入後台...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);

  } catch (error) {
    msg.innerText = "❌ 登入失敗：" + error.message;
  }
};

</script>

</body>
</html>
