<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>後台登入</title>
</head>
<body>

<h2>車商後台登入</h2>

<input id="email" placeholder="帳號">
<br><br>
<input id="password" type="password" placeholder="密碼">
<br><br>
<button onclick="login()">登入</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  databaseURL: "https://paul-garage-default-rtdb.firebaseio.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 已登入直接進後台
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});

// 🔐 登入
window.login = function () {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("登入成功");
      window.location.href = "dashboard.html";
    })
    .catch(() => {
      alert("登入失敗");
    });
};

</script>

</body>
</html>
