<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>登入</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:Arial;
}

.box{
  text-align:center;
  background:#1c1c1c;
  padding:40px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="box">
  <h2>後台登入</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">登入</button>

  <p id="msg"></p>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "firebase/auth";

window.login = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "登入中...";

  try {
    const user = await signInWithEmailAndPassword(auth, email, password);

    console.log("登入成功", user);

    msg.innerText = "登入成功，跳轉中...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);

  } catch (error) {
    console.error(error);
    msg.innerText = "登入失敗：" + error.message;
  }
};
</script>

</body>
</html>
