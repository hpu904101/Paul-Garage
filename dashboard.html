<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>車商後台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

.container{
  width:500px;
  margin:30px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#00c300;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.car{
  background:#2a2a2a;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
img{width:100px;}
</style>
</head>

<body>

<h2 style="text-align:center;">車商後台 Dashboard</h2>

<div class="container">
  <h3>新增車輛</h3>

  <input id="name" placeholder="車名">
  <input id="price" placeholder="價格">
  <input id="img" placeholder="圖片網址">
  <input id="desc" placeholder="配備 / 說明">

  <button onclick="addCar()">上架車輛</button>
  <button onclick="logout()">登出</button>
</div>

<div class="container">
  <h3>車輛列表</h3>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 保護後台
onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "admin.html";
  }
});

// 🚪 登出
window.logout = function(){
  signOut(auth).then(()=>{
    window.location.href = "admin.html";
  });
};

// 🚗 上架車輛（圖片網址版）
window.addCar = async function(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const img = document.getElementById("img").value;
  const desc = document.getElementById("desc").value;

  if(!name || !price || !img){
    alert("請填完整資料");
    return;
  }

  await addDoc(collection(db,"cars"),{
    name,
    price,
    img,
    desc,
    active:true
  });

  alert("上架成功");

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("img").value="";
  document.getElementById("desc").value="";
};

// 📦 列表
const list = document.getElementById("list");

onSnapshot(collection(db,"cars"),(snap)=>{

  list.innerHTML="";

  snap.forEach(d=>{
    const c = d.data();

    list.innerHTML+=`
      <div class="car">
        <img src="${c.img}"><br>
        <b>${c.name}</b><br>
        ${c.price}<br>
        ${c.desc||""}<br>

        <button onclick="toggleCar('${d.id}',${c.active})">
          ${c.active?"下架":"上架"}
        </button>

        <button onclick="delCar('${d.id}')">刪除</button>
      </div>
    `;
  });

});

// 上下架
window.toggleCar = async function(id,status){
  await updateDoc(doc(db,"cars",id),{
    active:!status
  });
};

// 刪除
window.delCar = async function(id){
  if(confirm("確定刪除？")){
    await deleteDoc(doc(db,"cars",id));
  }
};

</script>

</body>
</html>
