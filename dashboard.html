<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>車商後台</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* 置中標題 */
.center {
  text-align: center;
  margin-top: 30px;
}

.container {
  width: 500px;
  margin: 30px auto;
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.car {
  background: #2a2a2a;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1 class="center">車商後台 Dashboard</h1>

<div class="container">
  <h3>新增車輛</h3>

  <input id="name" placeholder="車名">
  <input id="price" placeholder="價格">

  <button onclick="addCar()">上架車輛</button>
</div>

<div class="container">
  <h3>上架車輛列表</h3>
  <div id="list"></div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "firebase/auth";
import {
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot
} from "firebase/firestore";

/* 防止未登入 */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin.html";
  }
});

/* 新增車輛 */
window.addCar = async function () {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  await addDoc(collection(db, "cars"), {
    name,
    price,
    created: Date.now()
  });

  alert("上架成功");
};

/* 即時列表 */
const list = document.getElementById("list");

onSnapshot(collection(db, "cars"), (snap) => {
  list.innerHTML = "";

  snap.forEach((docItem) => {
    const data = docItem.data();

    list.innerHTML += `
      <div class="car">
        <div>${data.name}</div>
        <div>${data.price}</div>
        <button onclick="delCar('${docItem.id}')">下架</button>
      </div>
    `;
  });
});

/* 下架 */
window.delCar = async function (id) {
  await deleteDoc(doc(db, "cars", id));
};
</script>

</body>
</html>
