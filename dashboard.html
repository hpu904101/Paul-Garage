<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>後台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.center{
  text-align:center;
  margin-top:30px;
}

.box{
  width:500px;
  margin:30px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}
</style>
</head>

<body>

<h1 class="center">車輛後台</h1>

<div class="box">
  <h3>上架車輛</h3>

  <input id="name" placeholder="車名">
  <input id="price" placeholder="價格">

  <button onclick="addCar()">上架</button>
</div>

<div class="box">
  <h3>列表</h3>
  <div id="list"></div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  onAuthStateChanged,
  signOut
} from "firebase/auth";

import {
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "firebase/firestore";

/* 🔥 防止未登入 */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "admin.html";
  }
});

/* 上架 */
window.addCar = async () => {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  await addDoc(collection(db,"cars"),{
    name,
    price,
    time:Date.now()
  });
};

/* 即時列表 */
const list = document.getElementById("list");

onSnapshot(collection(db,"cars"),(snap)=>{
  list.innerHTML = "";

  snap.forEach(d=>{
    list.innerHTML += `
      <div style="padding:10px;background:#333;margin:5px;">
        ${d.data().name} - ${d.data().price}
        <button onclick="del('${d.id}')">下架</button>
      </div>
    `;
  });
});

/* 下架 */
window.del = async (id)=>{
  await deleteDoc(doc(db,"cars",id));
};
</script>

</body>
</html>
