<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>後台</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;}
.container{width:90%;max-width:500px;margin:20px auto;background:#222;padding:20px;border-radius:10px;}
input{width:100%;padding:10px;margin:6px 0;}
button{width:100%;padding:10px;margin-top:6px;}
.car{background:#333;padding:10px;margin-top:10px;border-radius:8px;}
img{width:100%;}
</style>
</head>

<body>

<div class="container">
<h2>新增車輛</h2>

<input id="name" placeholder="車名">
<input id="price" placeholder="價格">
<input id="img" placeholder="圖片網址">
<input id="desc" placeholder="描述">

<button onclick="addCar()">上架</button>
</div>

<div class="container">
<h2>車輛列表</h2>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc,onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
authDomain:"paul-garage.firebaseapp.com",
projectId:"paul-garage"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

// ✔ 上架（重點：addDoc）
window.addCar=async function(){

await addDoc(collection(db,"cars"),{
name:name.value,
price:price.value,
img:img.value,
desc:desc.value,
active:true
});

alert("上架成功");
};

// ✔ 即時列表
onSnapshot(collection(db,"cars"),(snap)=>{

let html="";

snap.forEach(d=>{
const c=d.data();

html+=`
<div class="car">
<img src="${c.img}">
<b>${c.name}</b><br>
${c.price}<br>
${c.desc||""}<br>

<button onclick="del('${d.id}')">刪除</button>

<button onclick="toggle('${d.id}',${c.active})">
${c.active?"下架":"上架"}
</button>

</div>
`;
});

list.innerHTML=html;
});

// ✔ 刪除
window.del=async function(id){
await deleteDoc(doc(db,"cars",id));
};

// ✔ 上下架
window.toggle=async function(id,state){
await updateDoc(doc(db,"cars",id),{
active:!state
});
};

</script>

</body>
</html>
