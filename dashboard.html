<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Paul Garage 後台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.container{
  width:90%;
  max-width:520px;
  margin:20px auto;
  background:#1f1f1f;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.car{
  background:#2b2b2b;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.car img{
  width:100%;
  border-radius:6px;
}

.smallBtn{
  width:48%;
  display:inline-block;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">
<h2>🚗 新增車輛</h2>

<input id="name" placeholder="車名">
<input id="price" placeholder="價格">
<input id="img" placeholder="圖片網址">
<input id="desc" placeholder="描述">

<button onclick="addCar()">上架車輛</button>
</div>

<div class="container">
<h2>📦 車輛列表</h2>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ======================
   🚗 新增車輛（重點修正）
====================== */
window.addCar = async function(){

  const nameVal = document.getElementById("name").value;
  const priceVal = document.getElementById("price").value;
  const imgVal = document.getElementById("img").value;
  const descVal = document.getElementById("desc").value;

  if(!nameVal || !priceVal || !imgVal){
    alert("請填完整資料");
    return;
  }

  await addDoc(collection(db,"cars"),{
    name:nameVal,
    price:priceVal,
    img:imgVal,
    desc:descVal,
    active:true
  });

  alert("上架成功");

  document.getElementById("name").value="";
  document.getElementById("price").value="";
  document.getElementById("img").value="";
  document.getElementById("desc").value="";
};

/* ======================
   📦 即時列表
====================== */
const list = document.getElementById("list");

onSnapshot(collection(db,"cars"),(snap)=>{

  list.innerHTML=""; // ✔ 防止重複

  snap.forEach(d=>{

    const c = d.data();

    if(!c) return;

    list.innerHTML += `
      <div class="car">
        <img src="${c.img || ''}">
        <b>${c.name || ''}</b><br>
        ${c.price || ''}<br>
        ${c.desc || ''}<br>

        <button class="smallBtn" onclick="toggleCar('${d.id}',${c.active})">
          ${c.active ? "下架" : "上架"}
        </button>

        <button class="smallBtn" onclick="delCar('${d.id}')">
          刪除
        </button>
      </div>
    `;
  });
});

/* ======================
   🗑 刪除
====================== */
window.delCar = async function(id){
  if(confirm("確定刪除？")){
    await deleteDoc(doc(db,"cars",id));
  }
};

/* ======================
   🔁 上下架
====================== */
window.toggleCar = async function(id,state){
  await updateDoc(doc(db,"cars",id),{
    active:!state
  });
};

</script>

</body>
</html>
