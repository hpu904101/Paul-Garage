<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>車商後台</title>
</head>
<body>

<h2>車輛管理後台</h2>

<button onclick="logout()">登出</button>

<hr>

<input id="name" placeholder="車名">
<br><br>
<input id="price" placeholder="價格">
<br><br>
<input id="img" placeholder="圖片URL">
<br><br>

<button onclick="addCar()">上架車輛</button>

<h3>車輛列表</h3>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  databaseURL: "https://paul-garage-default-rtdb.firebaseio.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 防護：沒登入直接踢出去
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin.html";
  }
});

// 🚪 登出
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "admin.html";
  });
};

// 🚗 上架車輛
window.addCar = async function () {
  await addDoc(collection(db, "cars"), {
    name: name.value,
    price: price.value,
    img: img.value
  });

  alert("上架成功");
  loadCars();
};

// 📦 讀取車輛
async function loadCars() {
  const snap = await getDocs(collection(db, "cars"));

  let html = "";

  snap.forEach(d => {
    const c = d.data();

    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <img src="${c.img}" width="150"><br>
        <b>${c.name}</b><br>
        ${c.price}<br>
        <button onclick="deleteCar('${d.id}')">下架</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// ❌ 下架
window.deleteCar = async function (id) {
  await deleteDoc(doc(db, "cars", id));
  loadCars();
};

loadCars();

</script>

</body>
</html>
