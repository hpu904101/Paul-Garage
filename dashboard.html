<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>車商後台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.center{
  text-align:center;
  margin-top:30px;
}

.container{
  width:500px;
  margin:30px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#00c300;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.car{
  background:#2a2a2a;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1 class="center">車商後台 Dashboard</h1>

<div class="container">
  <h3>新增車輛</h3>

  <input id="name" placeholder="車名">
  <input id="price" placeholder="價格">
  <input id="img" placeholder="圖片URL">
  <input id="desc" placeholder="配備 / 說明">

  <button onclick="addCar()">上架車輛</button>
  <button onclick="logout()">登出</button>
</div>

<div class="container">
  <h3>車輛列表</h3>
  <div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 沒登入 → 踢回登入頁
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "admin.html";
  }
});

// 🚪 登出
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "admin.html";
  });
};

// 🚗 上架車輛
window.addCar = async function () {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const img = document.getElementById("img").value;
  const desc = document.getElementById("desc").value;

  if(!name || !price || !img){
    alert("請填寫完整資料");
    return;
  }

  await addDoc(collection(db, "cars"), {
    name,
    price,
    img,
    desc,
    active: true // ⭐ 預設上架
  });

  alert("上架成功");

  // 清空欄位
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("img").value = "";
  document.getElementById("desc").value = "";
};

// 📦 即時顯示車輛
const list = document.getElementById("list");

onSnapshot(collection(db, "cars"), (snap) => {

  list.innerHTML = "";

  snap.forEach((d) => {
    const c = d.data();

    list.innerHTML += `
      <div class="car">
        <img src="${c.img}" width="100"><br>
        <b>${c.name}</b><br>
        ${c.price}<br>
        ${c.desc || ""}<br>

        <button onclick="toggleCar('${d.id}', ${c.active})">
          ${c.active ? "下架" : "上架"}
        </button>

        <button onclick="delCar('${d.id}')">刪除</button>
      </div>
    `;
  });

});

// 🔄 上下架
window.toggleCar = async function(id, status){
  await updateDoc(doc(db, "cars", id), {
    active: !status
  });
};

// ❌ 刪除
window.delCar = async function (id) {

  if(confirm("確定要刪除嗎？")){
    await deleteDoc(doc(db, "cars", id));
  }
};

</script>

</body>
</html>
