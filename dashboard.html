<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Paul Garage 後台</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

h2{
  text-align:center;
  padding:15px;
}

.container{
  width:90%;
  max-width:500px;
  margin:20px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.addBtn{background:#00c300;color:#fff;}
.logoutBtn{background:#555;color:#fff;}

.car{
  background:#2a2a2a;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.car img{
  width:100%;
  border-radius:6px;
}

/* 修改視窗 */
#editBox{
  display:none;
  position:fixed;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:400px;
  background:#222;
  padding:20px;
  border-radius:10px;
  z-index:999;
}
</style>
</head>

<body>

<h2>🚗 車商後台 Dashboard</h2>

<!-- 新增車輛 -->
<div class="container">
  <h3>新增車輛</h3>

  <input id="name" placeholder="車名">
  <input id="price" placeholder="價格">
  <input id="img" placeholder="圖片網址">
  <input id="desc" placeholder="描述">

  <button class="addBtn" onclick="addCar()">上架車輛</button>
  <button class="logoutBtn" onclick="logout()">登出</button>
</div>

<!-- 列表 -->
<div class="container">
  <h3>車輛列表</h3>
  <div id="list"></div>
</div>

<!-- 修改 -->
<div id="editBox">
  <h3>修改車輛</h3>

  <input id="eName" placeholder="車名">
  <input id="ePrice" placeholder="價格">
  <input id="eImg" placeholder="圖片網址">
  <input id="eDesc" placeholder="描述">

  <button class="addBtn" onclick="saveEdit()">儲存修改</button>
  <button class="logoutBtn" onclick="closeEdit()">取消</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let editId = null;

/* 🔐 登入檢查 */
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href = "login.html";
  }
});

/* 🚪 登出 */
window.logout = async function(){
  await signOut(auth);
  window.location.href = "login.html";
};

/* 🚗 上架車輛 */
window.addCar = async function(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const img = document.getElementById("img").value;
  const desc = document.getElementById("desc").value;

  if(!name || !price){
    alert("請輸入車名與價格");
    return;
  }

  try{
    await addDoc(collection(db,"cars"),{
      name,
      price,
      img,
      desc,
      active:true,
      time:Date.now()
    });

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("img").value = "";
    document.getElementById("desc").value = "";

    alert("上架成功 🚗");

  }catch(err){
    alert("失敗：" + err.message);
    console.log(err);
  }
};

/* 📦 即時列表 */
const list = document.getElementById("list");

orderBy("time","desc")
onSnapshot(q,(snap)=>{

  list.innerHTML = "";

  snap.forEach(d=>{
    const c = d.data();

    list.innerHTML += `
      <div class="car">
        <img src="${c.img || ''}">
        <b>${c.name}</b><br>
        ${c.price}<br>
        ${c.desc || ""}<br>

        <button onclick="openEdit('${d.id}','${c.name}','${c.price}','${c.img}','${c.desc || ''}')">
          修改
        </button>

        <button onclick="toggle('${d.id}',${c.active})">
          ${c.active ? "下架" : "上架"}
        </button>

        <button onclick="del('${d.id}')">刪除</button>
      </div>
    `;
  });
});

/* 🔁 上下架 */
window.toggle = async function(id,state){
  await updateDoc(doc(db,"cars",id),{
    active:!state
  });
};

/* 🗑 刪除 */
window.del = async function(id){
  if(confirm("確定刪除？")){
    await deleteDoc(doc(db,"cars",id));
  }
};

/* ✏️ 修改 */
window.openEdit = function(id,name,price,img,desc){

  editId = id;

  document.getElementById("editBox").style.display = "block";

  eName.value = name;
  ePrice.value = price;
  eImg.value = img;
  eDesc.value = desc;
};

window.closeEdit = function(){
  document.getElementById("editBox").style.display = "none";
};

window.saveEdit = async function(){

  await updateDoc(doc(db,"cars",editId),{
    name:eName.value,
    price:ePrice.value,
    img:eImg.value,
    desc:eDesc.value
  });

  alert("修改成功");
  closeEdit();
};

</script>

</body>
</html>
