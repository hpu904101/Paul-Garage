<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paul Garage</title>

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei", sans-serif;
    background:#f4f4f4;
}

/* Header */
header{
    background:#0f0f0f;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* HERO */
.hero{
    background:#000;
    position:relative;
    height:520px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:url("520413253_122128191266841841_517358859357023635_n.jpg");
    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;
    transform:scale(1.05);
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.75)
    );
}

.hero-content{
    position:relative;
    z-index:2;
    color:#fff;
    text-align:center;
}

.hero h1{
    font-size:32px;
    margin-bottom:10px;
}

.line-btn{
    display:inline-block;
    padding:10px 16px;
    background:#00c300;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* section */
.section{
    padding:25px 15px;
    max-width:1100px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
    font-weight:bold;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-body{
    padding:12px;
}

.car-name{
    font-weight:bold;
    margin-bottom:6px;
}

.price{
    color:#e60000;
    font-weight:bold;
    margin-bottom:6px;
}

.desc{
    font-size:13px;
    color:#666;
}

/* LINE button */
.card a{
    display:inline-block;
    margin-top:10px;
    background:#111;
    color:#fff;
    padding:8px 10px;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
}

/* fixed LINE */
.fixed-line{
    position:fixed;
    right:15px;
    bottom:15px;
    background:#00c300;
    color:#fff;
    padding:12px 14px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

/* admin */
.admin-btn{
    position:fixed;
    top:15px;
    right:15px;
    background:#111;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* mobile */
@media (max-width:768px){
    .hero{height:300px;}
    .hero::before{background-size:cover;}
    .hero h1{font-size:24px;}
}
</style>
</head>

<body>

<header>
Paul Garage｜嚴選好車・立即預約賞車
</header>

<!-- 後台 -->
<a href="admin.html" class="admin-btn">登入</a>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>優質外匯車 / 中古車專賣</h1>
        <a class="line-btn" href="https://line.me/R/ti/p/@k9527" target="_blank">
            LINE 立即詢問
        </a>
    </div>
</div>

<!-- 車輛 -->
<div class="section">
    <div class="title">熱門車輛</div>
    <div class="grid" id="cars"></div>
</div>

<!-- LINE -->
<a class="fixed-line" href="https://line.me/R/ti/p/@k9527" target="_blank">LINE</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMRylaUJ3dI7KeA7vKN0FWPADnElPgIbY",
  authDomain: "paul-garage.firebaseapp.com",
  projectId: "paul-garage"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🚗 載入車輛
async function loadCars(){

  const snap = await getDocs(collection(db,"cars"));

  let html = "";

  snap.forEach(d=>{
    const c = d.data();

    if(c.active === false) return;

    html += `
      <div class="card">
        <img src="${c.img}">
        <div class="card-body">
            <div class="car-name">${c.name}</div>
            <div class="price">${c.price}</div>
            <div class="desc">${c.desc || ""}</div>

            <!-- 🔥 LINE 自動帶資料 -->
            <a target="_blank"
            href="https://line.me/R/oaMessage/@k9527/?%E6%88%91%E6%83%B3%E8%A9%A2%E5%95%8F%EF%BC%9A${encodeURIComponent(c.name)}%0A%E5%83%B9%E6%A0%BC%EF%BC%9A${encodeURIComponent(c.price)}%0A%E8%AA%AA%E6%98%8E%EF%BC%9A${encodeURIComponent(c.desc || '無')}"
            >
              LINE詢問
            </a>

        </div>
      </div>
    `;
  });

  document.getElementById("cars").innerHTML = html;
}

loadCars();

</script>

</body>
</html>
