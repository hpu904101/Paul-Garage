<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星岑車業</title>

<style>
/* 基本設定 */
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
}

/* HERO 主視覺區 */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 背景圖片（重點修正） */
.hero img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* ✅ 不裁切關鍵 */
    background: black;
}

/* 漸層遮罩 */
.hero::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.6)
    );
    pointer-events: none;
}

/* 文字區（如果你之後要放標題） */
.hero-text {
    position: absolute;
    color: white;
    text-align: center;
    z-index: 2;
}

/* 手機優化 */
@media (max-width: 768px) {
    .hero {
        height: 70vh;
    }

    .hero img {
        object-fit: contain;
    }
}
</style>
</head>

<body>

<!-- HERO區塊 -->
<div class="hero">

    <!-- 🔥 你的圖片（請換成你自己的連結） -->
    <img src="你的圖片連結或上傳後網址">

    <!-- 文字（可刪） -->
    <div class="hero-text">
        <h1>星岑車業</h1>
        <p>買車找力源</p>
    </div>

</div>

</body>
</html>
